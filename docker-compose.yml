services:
  dashboard:
    build:
      context: .
      args:
        - VITE_WEATHER_API_KEY=${VITE_WEATHER_API_KEY}
        - VITE_WEATHER_CITY=${VITE_WEATHER_CITY:-Paris}
        - VITE_WEATHER_UNITS=${VITE_WEATHER_UNITS:-metric}
        - VITE_WEATHER_LANG=${VITE_WEATHER_LANG:-fr}
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5100}
    ports:
      - "3000:80"
    restart: unless-stopped

  api:
    build:
      context: ./api
    ports:
      - "5100:5100"
    environment:
      - CALENDAR_ID=${CALENDAR_ID}
      - PLEX_URL=${PLEX_URL:-http://host-gateway:32400}
      - PLEX_PUBLIC_URL=${PLEX_PUBLIC_URL:-http://localhost:32400}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - RADARR_URL=${RADARR_URL:-http://host-gateway:7878}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - SONARR_URL=${SONARR_URL:-http://host-gateway:8989}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - /var/run/cups:/var/run/cups
      - /var/run/docker.sock:/var/run/docker.sock
      - ./credentials:/app/credentials:ro
    devices:
      - /dev/bus/usb:/dev/bus/usb
    restart: unless-stopped
